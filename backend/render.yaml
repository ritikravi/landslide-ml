services:
  - type: web
    name: landslide-monitoring-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: landslide-mongodb
    databaseName: landslide_monitoring
    user: landslide_user
